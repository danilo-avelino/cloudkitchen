name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Força JS actions em Node 24 agora (default em 02/jun/2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck
        continue-on-error: true  # allowJs + strict:false — só sinaliza por enquanto

      - name: Build (com credenciais dummy se não houver secrets)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://example.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'dummy-anon-key-for-ci' }}
          VITE_APP_VERSION: ${{ github.sha }}
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v5
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

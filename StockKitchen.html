<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>Cloud Kitchen — Protótipo</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2.45.0/dist/umd/supabase.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<!-- Desregistra service workers órfãos de outros projetos que rodaram em localhost:5173 -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then((regs) => {
    regs.forEach((r) => r.unregister().then((ok) => ok && console.info('[sw] unregistered:', r.scope)));
  });
}
</script>

<!-- Config local (gitignored) · define window.SK_CONFIG com URL + anon key -->
<script src="config.local.js"></script>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="widgets.jsx"></script>
<script type="text/babel" src="lib-supabase.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="page-login.jsx"></script>
<script type="text/babel" src="page-superadmin.jsx"></script>
<script type="text/babel" src="page-dashboard.jsx"></script>
<script type="text/babel" src="page-inventory.jsx"></script>
<script type="text/babel" src="page-stock.jsx"></script>
<script type="text/babel" src="page-recipes.jsx"></script>
<script type="text/babel" src="page-revenue.jsx"></script>
<script type="text/babel" src="page-requests.jsx"></script>
<script type="text/babel" src="page-purchases.jsx"></script>
<script type="text/babel" src="page-shopping.jsx"></script>
<script type="text/babel" src="page-cmv.jsx"></script>
<script type="text/babel" src="page-finance.jsx"></script>
<script type="text/babel" src="page-settings.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "density": "default"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULS);
  const [scope, setScope] = useState("all");
  const [page, setPage] = useState("dashboard");
  const [opMenuOpen, setOpMenuOpen] = useState(false);
  const [toasts, setToasts] = useState([]);
  const [user, setUser] = useState(() => getStoredSession());

  // Apply theme to <html>
  useEffect(() => {
    document.documentElement.setAttribute("data-theme", t.theme);
  }, [t.theme]);

  // Helper global de toast — disponível antes mesmo de logar
  useEffect(() => {
    let counter = 0;
    window.showToast = (msg, opts = {}) => {
      const id = `t-${Date.now()}-${counter++}`;
      const { tone = "ok", meta = "agora", ttl = 3200 } = opts;
      setToasts((cur) => [...cur, { id, msg, tone, meta }]);
      setTimeout(() => setToasts((cur) => cur.filter((t) => t.id !== id)), ttl);
      return id;
    };
    return () => { delete window.showToast; };
  }, []);

  const handleLogin = (u) => {
    setUser(u);
    if (u.role === "superadmin") {
      window.showToast(`Bem-vindo, ${u.name} · acesso superadmin`, { tone: "ok", ttl: 4500 });
    } else {
      window.showToast(`Bem-vindo, ${u.name}`, { tone: "ok", ttl: 3000 });
    }
  };

  const handleLogout = () => {
    clearStoredSession();
    setUser(null);
    setPage("dashboard");
    setScope("all");
  };

  // Sem usuário → tela de login
  if (!user) {
    return (
      <>
        <LoginPage onLogin={handleLogin} />
        <Toasts toasts={toasts} />
      </>
    );
  }

  // Superadmin → painel próprio (sem sidebar do app)
  if (user.role === "superadmin") {
    return (
      <>
        <SuperAdmin user={user} onLogout={handleLogout} />
        <Toasts toasts={toasts} />
      </>
    );
  }

  // App padrão — segue abaixo
  return <AppShell
    t={t} setTweak={setTweak} scope={scope} setScope={setScope}
    page={page} setPage={setPage} opMenuOpen={opMenuOpen} setOpMenuOpen={setOpMenuOpen}
    toasts={toasts} setToasts={setToasts} user={user} onLogout={handleLogout}
  />;
}

function AppShell({ t, setTweak, scope, setScope, page, setPage, opMenuOpen, setOpMenuOpen, toasts, setToasts, user, onLogout }) {
  // Welcome toast (uma vez por sessão)
  useEffect(() => {
    if (!user?.name) return;
    const id = Date.now();
    const firstName = user.name.split(" ")[0];
    setToasts([{ id, msg: `Bem-vindo, ${firstName}`, meta: "agora", tone: "ok" }]);
    const x = setTimeout(() => setToasts((cur) => cur.filter((t) => t.id !== id)), 3500);
    return () => clearTimeout(x);
  }, [user?.name]);

  // ⌘K: cycle scope
  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "k") {
        e.preventDefault();
        const ids = MOCK.OPERATIONS.map((o) => o.id);
        const cur = ids.indexOf(scope);
        setScope(ids[(cur + 1) % ids.length]);
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [scope]);

  const setTheme = (v) => setTweak("theme", v);

  return (
    <div data-screen-label={`page-${page}`} style={{ display: "flex", height: "100vh", overflow: "hidden", background: "var(--bg-0)" }}>
      <Sidebar scope={scope} setScope={setScope} page={page} setPage={setPage} opMenuOpen={opMenuOpen} setOpMenuOpen={setOpMenuOpen} user={user} />

      <main style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", minWidth: 0 }}>
        <Topbar page={page} scope={scope} theme={t.theme} setTheme={setTheme}
                user={user} onLogout={onLogout}
                onCmd={() => {
          const ids = MOCK.OPERATIONS.map((o) => o.id);
          const cur = ids.indexOf(scope);
          setScope(ids[(cur + 1) % ids.length]);
        }} />

        <div key={`${page}-${scope}`} style={{ flex: 1, overflow: "auto", background: "var(--bg-0)", animation: "fadeUp 220ms ease both" }}>
          {page === "dashboard" && <Dashboard scope={scope} setScope={setScope} setPage={setPage} />}
          {page === "stock"     && <Stock scope={scope} />}
          {page === "recipes"   && <Recipes scope={scope} />}
          {page === "revenue"   && <Revenue scope={scope} />}
          {page === "requests"  && <Requests scope={scope} />}
          {page === "purchases" && <Purchases />}
          {page === "cmv"       && <CMV setPage={setPage} />}
          {page === "finance"   && <Finance />}
          {page === "settings"  && <Settings />}
        </div>

        <StatusBar scope={scope} />
      </main>

      <Toasts toasts={toasts} />

      <TweaksPanel title="Tweaks">
        <TweakSection title="Aparência">
          <TweakRadio label="Tema" value={t.theme} onChange={(v) => setTweak("theme", v)} options={[
            { value: "dark", label: "Escuro" },
            { value: "light", label: "Claro" },
          ]} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
